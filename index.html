// API CLIENT — wraps fetch calls to /api/* endpoints
// All write operations go through Vercel serverless functions
// ============================================================
const API = {
  async post(path, body) {
    try {
      const res = await fetch('/api/' + path, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        console.warn('API error:', path, err);
        return {
          ok: false,
          error: err.error || 'Request failed'
        };
      }
      return await res.json();
    } catch (err) {
      // Network error or API not deployed yet — fail silently for UX
      console.warn('API network error:', path, err.message);
      return {
        ok: false,
        error: 'Network error'
      };
    }
  },
  // Helpers
  saveLead(data) {
    return this.post('lead', data);
  },
  setAlert(data) {
    return this.post('alert', data);
  },
  chat(data) {
    return this.post('chat', data);
  },
  trackShare(data) {
    return this.post('share', data);
  },
  trackPDF(data) {
    return this.post('pdf-track', data);
  }
};

// Read UTM params from URL (for attribution)
function readUTM() {
  try {
    const params = new URLSearchParams(window.location.search);
    return {
      utm_source: params.get('utm_source') || null,
      utm_medium: params.get('utm_medium') || null,
      utm_campaign: params.get('utm_campaign') || null
    };
  } catch (e) {
    return {};
  }
}

// Generate session ID for chat continuity
function genSessionId() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'sess-' + Date.now() + '-' + Math.random().toString(36).substring(2, 10);
}

// ============================================================
// DECISION ENGINE
// ============================================================
function recommendExams(answers) {
  const {
    qualification,
    branch,
    age,
    state,
    relocate,
    attempts,
    hours
  } = answers;
  const scoredExams = [];
  Object.keys(EXAMS).forEach(function (id) {
    const exam = EXAMS[id];
    if (exam.eligibility.indexOf(qualification) === -1) return;
    if (exam.branches.indexOf(branch) === -1) return;
    let score = 50;
    const isHomeStateExam = exam.scope === 'state' && exam.stateLink === state;
    const isCentralExam = exam.scope === 'central';
    const userHasMappedState = state !== 'other' && state !== '';
    if (isHomeStateExam) score += 25;
    if (isCentralExam) score += 8;
    if (relocate === 'home-only') {
      if (userHasMappedState) {
        if (!isHomeStateExam && !isCentralExam) score -= 40;
      } else {
        if (!isCentralExam) score -= 35;
      }
    }
    if (relocate === 'anywhere' && isCentralExam) score += 12;
    if (age === '30+' && exam.type === 'State JE') score -= 15;
    if (age === '<23' && exam.type === 'State AE') score -= 5;
    score += Math.min(exam.vacancies / 250, 15);
    if (attempts === '3+' && exam.type === 'State JE') score += 6;
    if (attempts === 'first' && exam.type === 'PSU AE' && hours !== '8+') score -= 12;
    if (hours === '<4' && exam.type === 'PSU AE') score -= 18;
    if (hours === '8+' && exam.type === 'PSU AE') score += 10;
    if (hours === '<4' && exam.type === 'State AE') score -= 5;
    if (qualification === 'btech') {
      if (exam.type === 'State AE') score += 12;
      if (exam.type === 'PSU AE') score += 6;
    }
    if (qualification === 'diploma') {
      if (exam.type === 'Central JE') score += 10;
      if (exam.type === 'State JE') score += 6;
    }
    scoredExams.push({
      id: id,
      exam: exam,
      score: score
    });
  });
  scoredExams.sort((a, b) => b.score - a.score);
  const validMatches = scoredExams.filter(s => s.score >= 35);
  const top = validMatches.slice(0, 3);
  if (top.length === 0) return [];
  const topScore = top[0].score;
  const minScore = Math.min.apply(null, top.map(t => t.score));
  const range = topScore - minScore || 1;
  return top.map((s, idx) => Object.assign({}, s.exam, {
    id: s.id,
    matchScore: Math.round(95 - idx * 4 - (topScore - s.score) / range * 8)
  }));
}

// ============================================================
// SALARY ENGINE — supports 8th CPC scenarios + city override
// ============================================================
function generateProjection(exam, userState, opts) {
  opts = opts || {};
  const cpcMode = opts.cpcMode || 'off'; // off | conservative | ambitious
  const cpcStartYear = opts.cpcStartYear || 2; // year when 8th CPC kicks in
  const cityOverride = opts.cityOverride || 'auto';
  const inflationRate = 0.06; // 6% annual inflation for real-value calc

  const cityClass = cityOverride !== 'auto' ? cityOverride : STATE_CITY_CLASS[userState] || 'Y';
  const hraRate = exam.hraTier === 'x-only' ? 0.30 : HRA_RATES[cityClass];
  const isPSU = exam.type === 'PSU AE' || exam.type === 'PSU JE';
  const cpcMultiplier = cpcMode === 'conservative' ? 2.0 : cpcMode === 'ambitious' ? 2.86 : 1.0;
  const daRate = 0.60;
  let basic = exam.basicPay;
  let cumulative = 0;
  let cumulativeReal = 0;
  const data = [];
  for (let year = 1; year <= 10; year++) {
    if (exam.promotionYear && year === exam.promotionYear) basic = basic * exam.promotionBump;
    let effectiveBasic = basic;
    if (exam.probationBasic && year <= exam.probationYears) effectiveBasic = exam.probationBasic;

    // 8th CPC reset — apply fitment factor at startYear
    let workingBasic = effectiveBasic;
    let workingDA = daRate;
    if (cpcMode !== 'off' && year >= cpcStartYear) {
      workingBasic = effectiveBasic * cpcMultiplier;
      // After CPC reset, DA resets to 0% then grows ~6%/year
      workingDA = Math.min(0.06 * (year - cpcStartYear), 0.40);
    }
    let monthly, annual;
    if (isPSU) {
      const ida = workingBasic * 0.534;
      const psuHra = workingBasic * (cityClass === 'X' ? 0.24 : 0.16);
      const perks = workingBasic * 0.35;
      monthly = workingBasic + ida + psuHra + perks;
      const annualPRP = workingBasic * 12 * 0.40;
      annual = monthly * 12 + annualPRP;
    } else {
      const da = workingBasic * workingDA;
      const hra = workingBasic * hraRate;
      const ta = exam.payLevel >= 9 ? 7200 * (1 + workingDA) : 3600 * (1 + workingDA);
      monthly = workingBasic + da + hra + ta;
      annual = monthly * 12;
    }
    cumulative += annual;
    // Inflation-adjusted (real value) — discount future years by inflation
    const realAnnual = annual / Math.pow(1 + inflationRate, year - 1);
    cumulativeReal += realAnnual;
    data.push({
      year: 'Y' + year,
      yearNum: year,
      monthly: Math.round(monthly),
      annual: Math.round(annual),
      cumulative: Math.round(cumulative),
      cumulativeReal: Math.round(cumulativeReal),
      realMonthly: Math.round(monthly / Math.pow(1 + inflationRate, year - 1)),
      basic: Math.round(workingBasic)
    });
    if (!exam.probationBasic || year > exam.probationYears) basic = basic * 1.03;
  }
  return data;
}

const inrFormatter = new Intl.NumberFormat('en-IN', {
  maximumFractionDigits: 0
});
function formatINR(num) {
  if (num >= 10000000) return '\u20B9' + (num / 10000000).toFixed(2) + ' Cr';
  if (num >= 100000) return '\u20B9' + (num / 100000).toFixed(2) + ' L';
  if (num >= 1000) return '\u20B9' + (num / 1000).toFixed(0) + 'K';
  return '\u20B9' + inrFormatter.format(num);
}
function formatINRFull(num) {
  return '\u20B9' + inrFormatter.format(num);
}

  doc.setFont('helvetica', 'normal');
  doc.setTextColor(17, 24, 39);
  doc.text(`Join Testbook SuperCoaching for ${exam.name} - Live classes, mock tests, PYQs.`, 20, y + 14);

  doc.setTextColor(5, 150, 105);
  doc.text('Visit: testbook.com/super-coaching', 20, y + 20);

  doc.setFont('helvetica', 'italic');
  doc.setTextColor(107, 114, 128);
  doc.text('Calculations based on 7th Pay Commission, DA at 60% (Jan 2026). 8th CPC scenario:' + (opts.cpcMode || 'off') + '. City class: ' + cityClass + '. Includes annual increments and one promotion. For reference only.', 15, 285, {

  doc.save(filename);
}
